<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0F172A] text-[#E2E8F0]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Primary SEO & Brand Positioning -->
    <title>Hospital Portal — National Blood Infrastructure & Redistribution Intelligence Platform (Ethiopia)</title>
    <meta name="description" content="Centralized healthcare logistics, blood inventory orchestration, emergency coordination, and donor intelligence system for the Ethiopian National Blood Bank." />
    <meta name="keywords" content="DonorLink, Ethiopia blood bank, EBTBS, blood infrastructure logistics, healthcare supply chain, emergency blood coordination, Amharic blood registry" />
    <meta name="author" content="Ethiopian National Blood Bank Service" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook (For Secure Enterprise Sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DonorLink — National Blood Infrastructure Platform" />
    <meta property="og:description" content="Production-grade centralized logistics control and real-time blood inventory orchestration for Ethiopia." />
    <meta property="og:image" content="/DonorLink-Logo.png" />
    <meta property="og:site_name" content="DonorLink Ethiopia" />

    <!-- Twitter Card data -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DonorLink — National Blood Infrastructure Platform" />
    <meta name="twitter:description" content="Centralized healthcare logistics and real-time blood redistribution intelligence for Ethiopia." />
    <meta name="twitter:image" content="/DonorLink-Logo.png" />

    <!-- Performance & Resource Hints (Font Optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Critical CSS Preload Strategy for Core Operations UI -->
    <link 
      rel="preload" 
      as="style" 
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap" 
    />
    <link 
      rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap" 
      media="print" 
      onload="this.media='all'" 
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Inter:wght@400;500;600&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap" />
    </noscript>

    <!-- PWA & Mobile Security App Capability -->
    <meta name="theme-color" content="#B91C1C" /> <!-- Deep Blood Red for Mobile Status Bars -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon Strategy -->
    <link rel="icon" type="image/svg+xml" href="/DonorLink-Logo.png" />
    <link rel="apple-touch-icon" href="/DonorLink-Logo.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="h-full antialiased selection:bg-[#B91C1C] selection:text-white">
    
    <!-- Application Root Shell -->
    <div id="root" class="min-h-full flex flex-col"></div>
    
    <!-- Core Application Bundle -->
    <script type="module" src="/src/main.tsx"></script>
    
  </body>
</html>
