<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DonorLink - Secure Staff Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600;700&amp;family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface": "#fff8f7",
                      "primary-fixed": "#ffdad6",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed": "#d5e3fd",
                      "error": "#ba1a1a",
                      "tertiary-fixed": "#eaddff",
                      "inverse-surface": "#3e2c2a",
                      "on-surface-variant": "#5b403d",
                      "secondary-fixed-dim": "#b9c7e0",
                      "on-secondary-fixed": "#0d1c2f",
                      "surface-tint": "#b91c1c",
                      "surface-variant": "#f9dcd8",
                      "error-container": "#ffdad6",
                      "inverse-on-surface": "#ffedea",
                      "on-tertiary-fixed": "#25005a",
                      "surface-bright": "#fff8f7",
                      "on-tertiary-fixed-variant": "#5a00c6",
                      "surface-container-highest": "#f9dcd8",
                      "inverse-primary": "#ffb4ab",
                      "primary-container": "#b91c1c",
                      "on-secondary-container": "#57657b",
                      "surface-container": "#ffe9e6",
                      "on-primary-fixed": "#410002",
                      "on-primary-fixed-variant": "#93000b",
                      "primary": "#93000b",
                      "on-surface": "#271816",
                      "tertiary-fixed-dim": "#d2bbff",
                      "outline": "#8f6f6c",
                      "tertiary": "#5a00c5",
                      "tertiary-container": "#732ee4",
                      "on-primary": "#ffffff",
                      "on-primary-container": "#ffcdc7",
                      "on-tertiary-container": "#e2d1ff",
                      "surface-container-low": "#fff0ee",
                      "surface-dim": "#f1d3d0",
                      "on-tertiary": "#ffffff",
                      "on-error": "#ffffff",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed-variant": "#3a485c",
                      "on-background": "#271816",
                      "secondary": "#515f74",
                      "surface-container-high": "#ffe2de",
                      "secondary-container": "#d5e3fd",
                      "outline-variant": "#e4beb9",
                      "on-error-container": "#93000a",
                      "background": "#fff8f7",
                      "primary-fixed-dim": "#ffb4ab"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "grid_columns": "12",
                      "sm": "12px",
                      "lg": "24px",
                      "sidebar_width": "260px",
                      "gutter": "16px",
                      "xs": "8px",
                      "md": "16px",
                      "xl": "32px",
                      "base": "4px",
                      "xxs": "4px"
              },
              "fontFamily": {
                      "title-sm": [
                              "Inter"
                      ],
                      "body-main": [
                              "Inter"
                      ],
                      "data-mono": [
                              "JetBrains Mono"
                      ],
                      "body-compact": [
                              "Inter"
                      ],
                      "headline-md": [
                              "IBM Plex Sans"
                      ],
                      "display-lg": [
                              "IBM Plex Sans"
                      ],
                      "label-caps": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "title-sm": [
                              "18px",
                              {
                                      "lineHeight": "1.4",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-main": [
                              "15px",
                              {
                                      "lineHeight": "1.5",
                                      "fontWeight": "400"
                              }
                      ],
                      "data-mono": [
                              "12px",
                              {
                                      "lineHeight": "1",
                                      "fontWeight": "500"
                              }
                      ],
                      "body-compact": [
                              "13px",
                              {
                                      "lineHeight": "1.4",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "24px",
                              {
                                      "lineHeight": "1.3",
                                      "fontWeight": "600"
                              }
                      ],
                      "display-lg": [
                              "36px",
                              {
                                      "lineHeight": "1.2",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "label-caps": [
                              "11px",
                              {
                                      "lineHeight": "1",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "700"
                              }
                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
          font-family: 'Material Symbols Outlined';
          font-weight: normal;
          font-style: normal;
          font-size: 24px;
          line-height: 1;
          letter-spacing: normal;
          text-transform: none;
          display: inline-block;
          white-space: nowrap;
          word-wrap: normal;
          direction: ltr;
          -webkit-font-feature-settings: 'liga';
          -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-main antialiased min-h-screen flex items-center justify-center p-md">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden flex flex-col relative z-10">
<!-- Header / Brand Area -->
<header class="bg-surface-container-highest px-lg py-xl border-b border-outline-variant flex flex-col items-center justify-center text-center relative">
<div class="absolute top-0 left-0 w-full h-1 bg-primary"></div>
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center mb-md border-[3px] border-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-xxs">DonorLink</h1>
<p class="font-body-compact text-body-compact text-on-surface-variant">Secure Staff Access</p>
</header>
<!-- Auth Form Content -->
<div class="p-lg flex flex-col gap-lg">
<!-- Role Selection -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant">OPERATIONAL ROLE</label>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center gap-xs px-sm py-xs border border-primary rounded bg-surface-variant text-primary font-body-compact text-body-compact text-left focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container-lowest transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span>Super Admin</span>
</button>
<button class="flex items-center gap-xs px-sm py-xs border border-outline-variant rounded bg-surface-container-lowest text-on-surface hover:border-outline hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container-lowest transition-colors" type="button">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">admin_panel_settings</span>
<span>National Admin</span>
</button>
<button class="flex items-center gap-xs px-sm py-xs border border-outline-variant rounded bg-surface-container-lowest text-on-surface hover:border-outline hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container-lowest transition-colors" type="button">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">local_hospital</span>
<span>Hospital Admin</span>
</button>
<button class="flex items-center gap-xs px-sm py-xs border border-outline-variant rounded bg-surface-container-lowest text-on-surface hover:border-outline hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1 focus:ring-offset-surface-container-lowest transition-colors" type="button">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">badge</span>
<span>Field Staff</span>
</button>
</div>
</div>
<hr class="border-outline-variant border-t"/>
<!-- Credentials Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs relative">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="identifier">STAFF ID / EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">badge</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded pl-[40px] pr-sm py-sm font-data-mono text-data-mono text-on-surface focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-colors" id="identifier" placeholder="SYS-ADMIN-01" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">AUTHORIZATION KEY</label>
<a class="font-label-caps text-label-caps text-primary hover:underline focus:outline-none" href="#">Forgot Key?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded pl-[40px] pr-[40px] py-sm font-data-mono text-data-mono text-on-surface focus:border-primary focus:ring-1 focus:ring-primary placeholder-on-surface-variant/50 transition-colors" id="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Secondary Auth Option -->
<div class="flex items-center justify-between bg-surface-container-low p-sm rounded border border-outline-variant mt-xs">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary text-[20px]">phonelink_lock</span>
<span class="font-body-compact text-body-compact text-on-surface">Require OTP Verification</span>
</div>
<a class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors focus:outline-none" href="#">Request Token</a>
</div>
<!-- Primary Action -->
<button class="mt-xs w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-title-sm text-title-sm py-sm rounded border border-primary flex items-center justify-center gap-xs transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest shadow-[0_4px_12px_rgba(15,23,42,0.05)]" type="submit">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">login</span>
                    Authenticate Session
                </button>
</form>
</div>
<!-- Footer / Warning Area -->
<footer class="bg-error-container/20 border-t border-error-container p-sm flex items-start gap-sm">
<span class="material-symbols-outlined text-error text-[20px] shrink-0 mt-[2px]">warning</span>
<p class="font-body-compact text-body-compact text-on-surface-variant text-[11px] leading-tight">
                Warning: This is a restricted national infrastructure portal. Unauthorized access attempts are monitored and logged by the command center.
            </p>
</footer>
</main>
<!-- Background decorative elements to emphasize control tower feel, very subtle -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-[0.03]" style="background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px); background-size: 32px 32px;">
</div>
</body></html>
