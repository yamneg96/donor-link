# ==================================================
# DonorLink - Development Overrides
# ==================================================

services:
  api:
    build:
      target: builder

    container_name: donorlink-api-dev

    command: ["npx", "tsx", "watch", "src/server.ts"]

    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules

    ports:
      - "5000:5000"
      - "9229:9229"

  mongodb:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
